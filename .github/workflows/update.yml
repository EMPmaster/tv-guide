name: Generate EPG

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 

      - name: Run Legacy Safety Scraper 
        run: node epg.js

      - name: Run Modular Scrapers
        run: node scrapers/mako.js
          
      - name: Merge Modular XML Files
        run: node merge.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "epg-bot"
          git config --global user.email "bot@epg.local"
          
          # 1. Stage the new XML files
          git add .
          
          # 2. Save (Commit) the files locally first!
          git diff --quiet && git diff --staged --quiet || git commit -m "Automated Data Refresh"
          
          # 3. NOW safely check the cloud for any changes you made manually
          git pull --rebase origin main
          
          # 4. Upload everything to GitHub
          git push
