name: Update EPG

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Modular Scrapers
        run: |
          node scrapers/mako.js
          node scrapers/cnbc.js
          node scrapers/kan.js

      - name: Merge XML Files
        run: |
          node merge.js

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add xml/*.xml images/ merged_guide.xml
          git commit -m "🤖 Auto-Update: Merged EPGs & Images" || true
          git push
